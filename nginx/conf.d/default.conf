# AutoGeo API 反向代理配置
# 适用于阿里云ECS部署

server {
    listen 80;
    server_name _;  # 接受所有域名，或改为你的IP/域名

    # 健康检查端点
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API代理 - 后端FastAPI服务
    location /api/ {
        proxy_pass http://backend_servers/api/;
        proxy_http_version 1.1;

        # 超时设置（后端处理可能较慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket支持（如果有需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 缓存控制
        proxy_set_header Cache-Control "no-cache";
    }

    # 静态文件服务（后端上传的文件）
    location /static/ {
        proxy_pass http://backend_servers/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 后端直接访问（兼容旧路径）
    location /docs {
        proxy_pass http://backend_servers/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend_servers/openapi.json;
        proxy_set_header Host $host;
    }

    # 前端Web应用（如果部署在同一服务器）
    # 后期可以改为静态文件服务
    # location / {
    #     root /var/www/autogeo-web;
    #     try_files $uri $uri/ /index.html;
    #     expires 1d;
    # }
}
