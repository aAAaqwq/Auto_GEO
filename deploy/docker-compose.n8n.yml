# n8n зӢ¬з«ӢйғЁзҪІй…ҚзҪ®
# зүҲжң¬: 1.0.1
# йҖӮз”Ё: йҳҝйҮҢдә‘ECSзӢ¬з«ӢйғЁзҪІпјҲдҪҝз”Ёauto_geo_backendзҡ„PostgreSQLпјү

services:
  # ============================================
  # Redis - жү§иЎҢйҳҹеҲ—е’Ңзј“еӯҳпјҲn8nдё“з”Ёпјү
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: n8n_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-n8n_redis_password}
    volumes:
      - redis_data:/data
    networks:
      - autogeo_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================
  # n8n дё»жңҚеҠЎ
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_main
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/webhook}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-n8n_password}
      # дҪҝз”Ёauto_geo_backendзҡ„PostgreSQLпјҢж•°жҚ®еә“еҗҚдёәn8n
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=autogeo_postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${DB_USER:-autogeo}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-n8n_redis_password}
      - EXECUTIONS_MODE=${EXECUTIONS_MODE:-regular}
      - EXECUTIONS_PROCESS=${EXECUTIONS_PROCESS:-main}
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=${EXECUTIONS_DATA_MAX_AGE:-168}
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=${N8N_CONCURRENCY:-10}
      - N8N_PAYLOAD_SIZE_MAX=16
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - N8N_HIRING_BANNER_ENABLED=false
      - N8N_PUBLIC_API_DISABLED=true
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./backup:/backup
    networks:
      - autogeo_network
    depends_on:
      redis:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # n8n Webhook е·ҘдҪңиҠӮзӮ№пјҲеҸҜйҖүпјҢй«ҳеҸҜз”Ёж—¶дҪҝз”Ёпјү
  # ============================================
  n8n_webhook:
    image: n8nio/n8n:latest
    container_name: n8n_webhook
    restart: unless-stopped
    command: webhook
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/webhook}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=autogeo_postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${DB_USER:-autogeo}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-n8n_redis_password}
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
    ports:
      - "5679:5678"
    networks:
      - autogeo_network
    depends_on:
      - redis
    profiles:
      - ha
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================
  # n8n Worker е·ҘдҪңиҠӮзӮ№пјҲеҸҜйҖүпјҢй«ҳеҸҜз”Ёж—¶дҪҝз”Ёпјү
  # ============================================
  n8n_worker:
    image: n8nio/n8n:latest
    container_name: n8n_worker
    restart: unless-stopped
    command: worker --concurrency=5
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=autogeo_postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${DB_USER:-autogeo}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-n8n_redis_password}
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - EXECUTIONS_MODE=queue
    networks:
      - autogeo_network
    depends_on:
      - redis
    profiles:
      - ha
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

# ============================================
# зҪ‘з»ңй…ҚзҪ®пјҲдёҺauto_geo_backendе…ұдә«пјү
# ============================================
networks:
  autogeo_network:
    external: true
    name: autogeo_network

# ============================================
# ж•°жҚ®еҚ·й…ҚзҪ®
# ============================================
volumes:
  redis_data:
    name: n8n_redis_data
  n8n_data:
    name: n8n_data
