# ======================================== # Startup Validation CI/CD # Purpose: 验证项目结构和部署配置 # Updated: 2026-05-08 # ========================================  name: Startup Validation  on:   push:     branches: ['**']   pull_request:     branches: [master, main]   workflow_dispatch:  env:   PYTHON_VERSION: '3.12'   NODE_VERSION: '20'  jobs:   # ==================== 后端代码检查 ====================   backend-check:     name: 🚀 Backend Code Check     runs-on: ubuntu-latest      steps:       - name: Checkout         uses: actions/checkout@v4        - name: Set up Python         uses: actions/setup-python@v5         with:           python-version: ${{ env.PYTHON_VERSION }}           cache: 'pip'           cache-dependency-path: backend/requirements.txt        - name: Install dependencies         working-directory: ./backend         run: pip install -r requirements.txt        - name: Check backend structure         run: |           # 检查关键文件           test -f backend/main.py || (echo "❌ backend/main.py 不存在" && exit 1)           test -f backend/requirements.txt || (echo "❌ backend/requirements.txt 不存在" && exit 1)           echo "✅ 后端结构检查通过"        - name: Check database migrations         run: |           test -d backend/migrations || (echo "⚠️ backend/migrations 不存在" && exit 1)           test -f backend/alembic.ini || (echo "⚠️ backend/alembic.ini 不存在" && exit 1)           echo "✅ 数据库迁移配置检查通过"    # ==================== 前端构建检查 ====================   frontend-check:     name: 🎨 Frontend Build Check     runs-on: ubuntu-latest      steps:       - name: Checkout         uses: actions/checkout@v4        - name: Setup Node.js         uses: actions/setup-node@v4         with:           node-version: ${{ env.NODE_VERSION }}           cache: 'npm'           cache-dependency-path: frontend/package-lock.json        - name: Install dependencies         working-directory: ./frontend         env:           ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/         run: npm install        - name: Build renderer         working-directory: ./frontend         run: npm run build:renderer        - name: Build Electron main         working-directory: ./frontend         run: npm run build:electron        - name: Check build output         working-directory: ./frontend         run: |           test -f out/electron/main/index.js || (echo "❌ Electron构建失败" && exit 1)           echo "✅ 前端构建检查通过"    # ==================== 部署配置检查 ====================   deploy-config-check:     name: 📦 Deploy Config Check     runs-on: ubuntu-latest      steps:       - name: Checkout         uses: actions/checkout@v4        - name: Check deploy directory structure         run: |           echo "=== 检查部署目录结构 ==="                      # 检查docker-compose文件           test -f deploy/docker-compose.backend.yml || (echo "❌ docker-compose.backend.yml 不存在" && exit 1)           test -f deploy/docker-compose.n8n.yml || (echo "❌ docker-compose.n8n.yml 不存在" && exit 1)           test -f deploy/docker-compose.ragflow.yml || (echo "❌ docker-compose.ragflow.yml 不存在" && exit 1)                      # 检查部署脚本           test -x deploy/deploy-backend.sh || (echo "❌ deploy-backend.sh 不存在或不可执行" && exit 1)           test -x deploy/deploy-n8n.sh || (echo "❌ deploy-n8n.sh 不存在或不可执行" && exit 1)           test -x deploy/ragflow-deploy.sh || (echo "❌ ragflow-deploy.sh 不存在或不可执行" && exit 1)                      # 检查环境变量模板           test -f deploy/.env.backend.example || (echo "❌ .env.backend.example 不存在" && exit 1)           test -f deploy/.env.n8n.example || (echo "❌ .env.n8n.example 不存在" && exit 1)           test -f deploy/.env.ragflow.example || (echo "❌ .env.ragflow.example 不存在" && exit 1)                      # 检查文档           test -f deploy/README.md || (echo "❌ deploy/README.md 不存在" && exit 1)           test -f deploy/RAGFLOW-DEPLOY.md || (echo "❌ deploy/RAGFLOW-DEPLOY.md 不存在" && exit 1)                      echo "✅ 部署配置检查通过"        - name: Validate docker-compose files         run: |           echo "=== 验证 docker-compose 文件 ==="           docker-compose -f deploy/docker-compose.backend.yml config > /dev/null || (echo "❌ docker-compose.backend.yml 格式错误" && exit 1)           docker-compose -f deploy/docker-compose.n8n.yml config > /dev/null || (echo "❌ docker-compose.n8n.yml 格式错误" && exit 1)           docker-compose -f deploy/docker-compose.ragflow.yml config > /dev/null || (echo "❌ docker-compose.ragflow.yml 格式错误" && exit 1)           echo "✅ docker-compose 文件格式验证通过"    # ==================== 文档检查 ====================   docs-check:     name: 📖 Documentation Check     runs-on: ubuntu-latest      steps:       - name: Checkout         uses: actions/checkout@v4        - name: Check main README         run: |           test -f README.md || (echo "❌ README.md 不存在" && exit 1)                      # 检查README是否包含部署说明           if grep -q "deploy/README.md" README.md; then             echo "✅ README 包含部署文档链接"           else             echo "⚠️ README 应该包含部署文档链接"           fi        - name: Check deploy README         run: |           test -f deploy/README.md || (echo "❌ deploy/README.md 不存在" && exit 1)                      # 检查是否包含关键章节           if grep -q "快速部署" deploy/README.md; then             echo "✅ deploy/README.md 包含快速部署说明"           else             echo "⚠️ deploy/README.md 应该包含快速部署说明"           fi