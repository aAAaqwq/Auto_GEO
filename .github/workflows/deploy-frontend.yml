name: Deploy Frontend

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
      - 'nginx/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到服务器'
        required: true
        default: 'true'

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # 代码质量检查与测试
  # ============================================
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Run tests
        run: npm run test || true

      - name: Build application
        run: npm run build:renderer

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/out/renderer
          retention-days: 1

  # ============================================
  # 部署到服务器 (直接使用服务器 nginx)
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Create production env
        working-directory: ./frontend
        run: |
          cat > .env.production << EOF
          VITE_API_BASE_URL=http://${{ secrets.SERVER_HOST }}/api
          VITE_WS_URL=ws://${{ secrets.SERVER_HOST }}/ws
          VITE_STATIC_URL=http://${{ secrets.SERVER_HOST }}/static
          VITE_ENABLE_MOCK=false
          VITE_APP_TITLE=AutoGeo
          EOF

      - name: Build for production
        working-directory: ./frontend
        run: npm run build:renderer

      - name: Deploy to server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "frontend/out/renderer/*"
          target: "/var/www/html"
          strip_components: 2
          rm: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            echo "🚀 [Frontend] 开始部署..."

            PROJECT_DIR="$HOME/Auto_GEO"

            # 如果目录不存在，克隆项目
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "📦 项目不存在，克隆仓库..."
              mkdir -p "$(dirname "$PROJECT_DIR")"
              mkdir -p ~/.ssh
              ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
              git clone git@github.com:aAAaqwq/Auto_GEO.git "$PROJECT_DIR" || {
                echo "⚠️ SSH克隆失败，使用HTTPS..."
                git clone https://github.com/aAAaqwq/Auto_GEO.git "$PROJECT_DIR"
              }
            fi

            cd "$PROJECT_DIR"

            # 确保 nginx html 目录存在
            sudo mkdir -p /var/www/html

            # 复制前端文件到 nginx 目录
            sudo cp -rf frontend/out/renderer/* /var/www/html/

            # 复制并部署 nginx 配置
            if [ -f "nginx/server-frontend.conf" ]; then
              echo "📝 部署 nginx 配置..."
              sudo cp -f nginx/server-frontend.conf /etc/nginx/sites-available/autogeo.conf
              sudo ln -sf /etc/nginx/sites-available/autogeo.conf /etc/nginx/sites-enabled/ 2>/dev/null || true
              # 移除默认配置
              sudo rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
            fi

            # 检查 nginx 配置语法
            sudo nginx -t

            # 重载 nginx
            sudo nginx -s reload || sudo systemctl reload nginx || sudo service nginx reload || {
              echo "⚠️ Nginx reload 失败，尝试重启..."
              sudo nginx -s stop 2>/dev/null || true
              sudo nginx
            }

            echo ""
            echo "========================================"
            echo "✅ 前端部署完成"
            echo "========================================"
            echo "访问地址: http://${{ secrets.SERVER_HOST }}"

      - name: Deployment Summary
        if: success()
        run: |
          echo "### 🎨 前端部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 服务器 | ${{ secrets.SERVER_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 部署目录 | /var/www/html |" >> $GITHUB_STEP_SUMMARY
          echo "| 访问地址 | http://${{ secrets.SERVER_HOST }} |" >> $GITHUB_STEP_SUMMARY
