name: Backend Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'deploy/docker-compose.backend.yml'
      - 'deploy/deploy-backend.sh'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到服务器'
        required: true
        default: 'true'

env:
  PYTHON_VERSION: '3.12'
  ALIYUN_REGISTRY: crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com
  ALIYUN_IMAGE: crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com/opencaio/auto_geo_backend

jobs:
  # ============================================
  # 构建并推送镜像到阿里云ACR
  # ============================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ALIYUN_IMAGE }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          compression: zstd
          compression-level: 9
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Verify image
        run: |
          docker buildx imagetools inspect ${{ env.ALIYUN_IMAGE }}:latest

  # ============================================
  # 部署到生产服务器
  # ============================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: false
          timeout: 600s
          script: |
            set -e
            echo "🚀 开始部署 AutoGeo 后端..."

            # 进入部署目录
            cd ~/Auto_GEO/deploy || {
              echo "❌ 部署目录不存在，请先克隆项目"
              exit 1
            }

            # 拉取最新代码
            git pull origin main || git pull origin master

            # 登录阿里云ACR
            echo "🔐 登录阿里云ACR..."
            docker login ${{ env.ALIYUN_REGISTRY }} \
              -u "${{ secrets.ALIYUN_ACR_USERNAME }}" \
              --password-file <(echo "${{ secrets.ALIYUN_ACR_PASSWORD }}")

            # 拉取最新镜像
            echo "📦 拉取最新镜像..."
            docker-compose -f docker-compose.backend.yml pull backend

            # 执行部署脚本
            echo "🚀 执行部署..."
            ./deploy-backend.sh .env.backend

            echo "✅ 部署完成！"

      - name: Deployment Summary
        if: success()
        run: |
          echo "### 🎉 后端部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **镜像**: ${{ env.ALIYUN_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **服务器**: ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **部署目录**: ~/Auto_GEO/deploy" >> $GITHUB_STEP_SUMMARY
